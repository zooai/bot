name: Deploy Bot Stack
on:
  workflow_dispatch: {}
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          repository: hanzoai/universe
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: infra/k8s/bot
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - run: doctl kubernetes cluster kubeconfig save "$HANZO_CLUSTER_ID"

      - name: Delete stale provisioned bot pods
        run: |
          echo "=== Cleaning up stale provisioned agent pods ==="
          # Delete agent-cloud pods that are orphaned (provisioned by playground but not connected)
          kubectl get pods -n hanzo -o name | grep 'agent-cloud-' | while read pod; do
            echo "Deleting orphaned $pod"
            kubectl delete "$pod" -n hanzo --grace-period=10 || true
          done

      - name: Patch cloud-agent with API keys and auth-profiles
        run: |
          ANTHROPIC_KEY=$(kubectl get secret bot-secrets -n hanzo -o jsonpath='{.data.ANTHROPIC_API_KEY}' | base64 -d)
          HANZO_KEY=$(kubectl get secret bot-secrets -n hanzo -o jsonpath='{.data.HANZO_API_KEY}' | base64 -d)

          echo "=== Set env vars ==="
          kubectl set env deploy/cloud-agent -n hanzo -c cloud-agent \
            ANTHROPIC_API_KEY="$ANTHROPIC_KEY" \
            HANZO_API_KEY="$HANZO_KEY"

          echo "=== Wait for rollout (if replicas > 0) ==="
          REPLICAS=$(kubectl get deploy/cloud-agent -n hanzo -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")
          if [ "${REPLICAS:-0}" -gt 0 ]; then
            kubectl rollout status deploy/cloud-agent -n hanzo --timeout=120s || true
          else
            echo "(cloud-agent has 0 replicas — skipping rollout wait)"
          fi

          echo "=== Write auth-profiles.json to main agent dir ==="
          # The bot creates per-agent dirs under ~/.openclaw/agents/<id>/agent/
          # but checks the MAIN agent dir first. Write auth-profiles.json there.
          AUTH_JSON='{"profiles":{"anthropic:default":{"type":"api_key","provider":"anthropic","key":"'"$ANTHROPIC_KEY"'"},"hanzo:default":{"type":"api_key","provider":"hanzo","key":"'"$HANZO_KEY"'"}},"default":"anthropic:default"}'
          kubectl exec -n hanzo deploy/cloud-agent -c cloud-agent -- sh -c "mkdir -p /home/node/.openclaw/agent && echo '$AUTH_JSON' > /home/node/.openclaw/agent/auth-profiles.json && echo 'auth-profiles.json written'" 2>&1 || echo "Failed to write auth-profiles"

          echo ""
          echo "=== Wait for node to register ==="
          sleep 15

      - name: Verify everything
        run: |
          echo "=== Pods ==="
          kubectl get pods -n hanzo -l 'app in (bot-gateway,operative,cloud-agent,hanzo-playground)' -o wide

          echo ""
          echo "=== Ingresses ==="
          kubectl get ingress -n hanzo bot-gateway-ingress bot-gateway-ws hanzo-playground -o wide 2>/dev/null || true

          echo ""
          echo "=== Gateway health ==="
          kubectl exec -n hanzo deploy/bot-gateway -c bot-gateway -- curl -s http://localhost:18789/health

          echo ""
          echo "=== Gateway WS test (from gateway pod) ==="
          kubectl exec -n hanzo deploy/bot-gateway -c bot-gateway -- timeout 5 node -e "
            const ws = new (require('ws'))('ws://localhost:18789/');
            ws.on('open', () => { console.log('WS OPEN'); ws.close(); process.exit(0); });
            ws.on('error', e => { console.log('WS ERROR:', e.message); process.exit(1); });
            setTimeout(() => { console.log('WS TIMEOUT'); process.exit(1); }, 4000);
          " 2>&1 || echo "WS test failed (non-fatal)"

          echo ""
          echo "=== Gateway logs (last 15) ==="
          kubectl logs -n hanzo deploy/bot-gateway -c bot-gateway --tail=15

          echo ""
          echo "=== Cloud-agent logs (last 15) ==="
          CLOUD_AGENT_READY=$(kubectl get deploy/cloud-agent -n hanzo -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
          if [ "${CLOUD_AGENT_READY:-0}" -gt 0 ]; then
            kubectl logs -n hanzo deploy/cloud-agent -c cloud-agent --tail=15
          else
            echo "(cloud-agent has 0 ready replicas — provisioned bots will use the updated image)"
          fi

          echo ""
          echo "=== Node registry ==="
          kubectl exec -n hanzo deploy/bot-gateway -c bot-gateway -- curl -s http://localhost:18789/__bot__/api/v1/nodes 2>/dev/null | python3 -c "
          import sys, json
          try:
            data = json.loads(sys.stdin.read())
            if isinstance(data, list):
              for n in data:
                print(f'  {n.get(\"id\",\"?\")} status={n.get(\"status\",\"?\")} connected={n.get(\"connected\",\"?\")}')
            elif isinstance(data, dict) and 'nodes' in data:
              for n in data['nodes']:
                print(f'  {n.get(\"id\",\"?\")} status={n.get(\"status\",\"?\")} connected={n.get(\"connected\",\"?\")}')
            else:
              print(json.dumps(data, indent=2)[:500])
          except:
            print(sys.stdin.read()[:500] if hasattr(sys.stdin, 'read') else 'parse error')
          " 2>/dev/null || echo "Cannot get nodes"
