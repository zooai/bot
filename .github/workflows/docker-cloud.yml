name: Build bot-cloud

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.cloud"
      - "docker/cloud-entrypoint.sh"
  workflow_dispatch:

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/bot-cloud
      dockerfile: Dockerfile.cloud
    secrets: inherit
