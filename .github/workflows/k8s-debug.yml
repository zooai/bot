name: K8s Debug
on:
  workflow_dispatch:
permissions:
  contents: read
env:
  HANZO_CLUSTER_ID: 1a153000-90a6-48ad-9375-7ef901a9bf7f
  GH_TOKEN: ${{ secrets.GH_PAT }}
jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}
      - run: doctl kubernetes cluster kubeconfig save "$HANZO_CLUSTER_ID"

      - name: Diagnose and fix bot stack
        run: |
          set -x

          echo "===== 1. Playground deployment env vars ====="
          kubectl get deploy/hanzo-playground -n hanzo -o jsonpath='{range .spec.template.spec.containers[0].env[*]}{.name}={.value}{"\n"}{end}' 2>/dev/null | grep -E '(CLOUD|K8S|ANTHROPIC|GATEWAY|ENABLED)' || echo "No matching env vars"
          echo ""
          kubectl get deploy/hanzo-playground -n hanzo -o jsonpath='{range .spec.template.spec.containers[0].envFrom[*]}{.secretRef.name}{"\n"}{end}' 2>/dev/null || true

          echo ""
          echo "===== 2. Playground logs (last 50) ====="
          kubectl logs -n hanzo deploy/hanzo-playground --tail=50 2>/dev/null || echo "No logs"

          echo ""
          echo "===== 3. All cloud/agent pods ====="
          kubectl get pods -n hanzo | grep -E 'cloud-|agent-|playground' || echo "None found"

          echo ""
          echo "===== 4. Bot gateway status ====="
          kubectl get pods -n hanzo -l app=bot-gateway -o wide 2>/dev/null || true
          kubectl exec -n hanzo deploy/bot-gateway -c bot-gateway -- curl -s http://localhost:18789/health 2>/dev/null || echo "Not healthy"

          echo ""
          echo "===== 5. Gateway node registry ====="
          kubectl exec -n hanzo deploy/bot-gateway -c bot-gateway -- curl -s http://localhost:18789/__bot__/api/v1/nodes 2>/dev/null | python3 -m json.tool 2>/dev/null | head -50 || echo "Cannot get"

          echo ""
          echo "===== 6. All ingresses for bot domains ====="
          kubectl get ingress -n hanzo -o custom-columns='NAME:.metadata.name,CLASS:.spec.ingressClassName,HOSTS:.spec.rules[*].host' | grep -E 'bot|gw|NAME' || true

          echo ""
          echo "===== 7. Fix: Delete conflicting nginx bot-gateway ingress ====="
          # The universe deployment.yaml creates an ingress with ingressClassName: ingress (nginx)
          # which conflicts with our Traefik bot-gateway-ws ingress
          CLASS=$(kubectl get ingress -n hanzo bot-gateway -o jsonpath='{.spec.ingressClassName}' 2>/dev/null || echo "")
          if [ -n "$CLASS" ]; then
            echo "Found bot-gateway ingress with class=$CLASS - deleting it"
            kubectl delete ingress -n hanzo bot-gateway 2>/dev/null || true
          fi

          echo ""
          echo "===== 8. Fix: Ensure gw.hanzo.bot TLS ingress exists ====="
          # Delete any stale cert/ingress and recreate
          kubectl delete secret gw-hanzo-bot-tls -n hanzo 2>/dev/null || true
          kubectl delete ingress bot-gateway-ws -n hanzo 2>/dev/null || true
          sleep 3

          # Self-signed cert for Traefik TLS termination
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout /tmp/tls.key -out /tmp/tls.crt \
            -subj "/CN=gw.hanzo.bot" -addext "subjectAltName=DNS:gw.hanzo.bot" 2>/dev/null
          kubectl create secret tls gw-hanzo-bot-tls -n hanzo \
            --cert=/tmp/tls.crt --key=/tmp/tls.key
          echo "Created self-signed TLS cert"

          # Create Traefik ingress
          cat <<'EOF' | kubectl apply -f -
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: bot-gateway-ws
            namespace: hanzo
            labels:
              app: bot-gateway
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
          spec:
            ingressClassName: gateway
            tls:
              - hosts:
                  - gw.hanzo.bot
                secretName: gw-hanzo-bot-tls
            rules:
              - host: gw.hanzo.bot
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: bot-gateway
                          port:
                            number: 80
          EOF
          echo "Applied gw.hanzo.bot Traefik ingress"

          echo ""
          echo "===== 9. Fix: Enable cloud provisioning on playground ====="
          # Check if playground has the cloud env vars
          HAS_CLOUD=$(kubectl get deploy/hanzo-playground -n hanzo -o jsonpath='{range .spec.template.spec.containers[0].env[*]}{.name}{"\n"}{end}' | grep -c 'CLOUD_ENABLED' || echo "0")
          if [ "$HAS_CLOUD" = "0" ]; then
            echo "Cloud provisioning NOT configured on playground. Adding env vars..."
            # Get ANTHROPIC_API_KEY from bot-secrets
            ANTHRO_KEY=$(kubectl get secret -n hanzo bot-secrets -o jsonpath='{.data.ANTHROPIC_API_KEY}' | base64 -d 2>/dev/null || echo "")
            GW_TOKEN=$(kubectl get secret -n hanzo bot-secrets -o jsonpath='{.data.BOT_GATEWAY_TOKEN}' | base64 -d 2>/dev/null || echo "")

            kubectl set env deploy/hanzo-playground -n hanzo \
              HANZO_PLAYGROUND_CLOUD_ENABLED=true \
              HANZO_PLAYGROUND_CLOUD_K8S_ENABLED=true \
              HANZO_PLAYGROUND_CLOUD_K8S_NAMESPACE=hanzo \
              HANZO_PLAYGROUND_CLOUD_K8S_AGENT_IMAGE=ghcr.io/hanzoai/bot:main \
              HANZO_PLAYGROUND_CLOUD_K8S_IMAGE_PULL_SECRET=ghcr-secret \
              HANZO_PLAYGROUND_CLOUD_K8S_OPERATIVE_ENABLED=true \
              HANZO_PLAYGROUND_CLOUD_K8S_OPERATIVE_IMAGE=ghcr.io/hanzoai/operative:latest \
              HANZO_PLAYGROUND_CLOUD_GATEWAY_URL=ws://bot-gateway.hanzo.svc:80 \
              HANZO_PLAYGROUND_CLOUD_GATEWAY_TOKEN="$GW_TOKEN" \
              ANTHROPIC_API_KEY="$ANTHRO_KEY" \
              2>&1 || echo "Failed to set env"
            echo "Waiting for playground rollout..."
            kubectl rollout status deploy/hanzo-playground -n hanzo --timeout=120s || true
          else
            echo "Cloud provisioning already configured"
          fi

          echo ""
          echo "===== 10. Fix: Create ServiceAccount + RBAC for playground pod provisioning ====="
          cat <<'EOF' | kubectl apply -f -
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: playground-agent
            namespace: hanzo
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: playground-agent-role
            namespace: hanzo
          rules:
            - apiGroups: [""]
              resources: ["pods", "pods/log"]
              verbs: ["get", "list", "create", "delete", "watch"]
            - apiGroups: [""]
              resources: ["secrets"]
              verbs: ["get"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: playground-agent-binding
            namespace: hanzo
          subjects:
            - kind: ServiceAccount
              name: playground-agent
              namespace: hanzo
          roleRef:
            kind: Role
            name: playground-agent-role
            apiGroup: rbac.authorization.k8s.io
          EOF
          echo "RBAC configured"

          # Ensure playground deployment uses this service account
          kubectl patch deploy/hanzo-playground -n hanzo --type=json \
            -p='[{"op":"add","path":"/spec/template/spec/serviceAccountName","value":"playground-agent"}]' 2>/dev/null || true
          kubectl rollout status deploy/hanzo-playground -n hanzo --timeout=120s 2>/dev/null || true

          echo ""
          echo "===== 11. Restart Traefik ====="
          kubectl rollout restart daemonset/hanzo-ingress -n hanzo 2>/dev/null || true
          sleep 15
          echo "Traefik restarted"

          echo ""
          echo "===== 12. Final verification ====="
          echo "--- Playground pod ---"
          kubectl get pods -n hanzo -l app=hanzo-playground -o wide
          echo "--- Playground env (cloud) ---"
          kubectl exec -n hanzo deploy/hanzo-playground -- env 2>/dev/null | grep -E '(CLOUD|K8S|ANTHROPIC|GATEWAY)' | sort || true
          echo "--- Gateway ingresses ---"
          kubectl get ingress -n hanzo -o custom-columns='NAME:.metadata.name,CLASS:.spec.ingressClassName,HOSTS:.spec.rules[*].host' | grep -E 'bot|gw|NAME'
          echo "--- Gateway health ---"
          kubectl exec -n hanzo deploy/bot-gateway -c bot-gateway -- curl -s http://localhost:18789/health 2>/dev/null || echo "Not healthy"
          echo "--- Playground health ---"
          kubectl exec -n hanzo deploy/hanzo-playground -- curl -s http://localhost:18788/health 2>/dev/null || echo "Not healthy"
          echo "--- Playground logs (last 10) ---"
          kubectl logs -n hanzo deploy/hanzo-playground --tail=10 2>/dev/null || true
